name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rspec:
    name: rspec / Ruby ${{ matrix.ruby }}
    # macos-14 is the Apple Silicon runner pool. mlx-rb needs Metal,
    # so there's no Linux/Intel Mac path.
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Select Xcode for Metal compiler
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ext/mlx_bridge/target
          key: cargo-${{ runner.os }}-${{ hashFiles('ext/mlx_bridge/Cargo.toml') }}

      - name: Build the Rust bridge
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          LIBCLANG_PATH: /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib
        run: bundle exec rake compile

      - name: Run rspec
        # Python-mlx and live HF oracle specs auto-skip when their deps
        # aren't installed.
        run: bundle exec rspec --format progress

  rubocop:
    name: rubocop
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: bundle exec rubocop --no-server
