name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rspec:
    name: rspec / Ruby ${{ matrix.ruby }}
    # `macos-14` is GitHub's Apple Silicon runner pool. MLX won't run on
    # macos-13 / ubuntu — the platform check at require-time bails.
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        run: brew install cmake

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Build mlx-c
        run: |
          mkdir -p ext/mlx_c/upstream/build
          cmake -S ext/mlx_c/upstream -B ext/mlx_c/upstream/build -DCMAKE_BUILD_TYPE=Release
          cmake --build ext/mlx_c/upstream/build --parallel

      - name: Run rspec
        # Python mlx isn't installed in CI by default — oracle-tagged
        # specs auto-skip with a warning rather than failing.
        run: bundle exec rspec --format progress

  rubocop:
    name: rubocop
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: bundle exec rubocop --no-server
